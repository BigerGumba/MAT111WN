<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>p5.js & Assets Demo</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- p5.js core + p5.sound for audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
  </head>

  <body>
    <div id="sketch"></div>
    <button id="play_button">Begin.</button>
    <script src="./sketch.js" defer></script>
    <script type="module" defer>
      import {flag} from "sketch";
      import {s} from "sketch";

      const playButton = document.getElementByID("play_button");

      function toggle() {
        if (flag[7]) {
          if (flag[8]) {
            if (flag[9]) {
              document.getElementById("play_button").textContent = "Game has been saved.";
            }
            else {
              document.getElementById("play_button").textContent = "Save?";
            }
          }
          else {
            document.getElementById("play_button").textContent = "Game in progress...";
          }
        }
        else {
          flag[7] = true;
          s = 300;
          document.getElementById("play_button").textContent = "Game in progress...";
        }
      }
      playButton.addEventListener("click", toggle);
    </script>
  </body>
</html>
